<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">Open Historia structured AI turns</title>
  <desc id="desc">A dark strategy atlas showing validated AI tool calls flowing safely into game state.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071219"/>
      <stop offset="0.52" stop-color="#0d2028"/>
      <stop offset="1" stop-color="#09151c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#d7bd7c" stop-opacity=".2"/>
      <stop offset="1" stop-color="#d7bd7c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4e8c2"/>
      <stop offset=".42" stop-color="#d8bd7f"/>
      <stop offset="1" stop-color="#9b7845"/>
    </linearGradient>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#cfaa62"/>
      <stop offset=".7" stop-color="#f2dc9d"/>
      <stop offset="1" stop-color="#75c7a0"/>
    </linearGradient>
    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0V54" fill="none" stroke="#b9c3b7" stroke-opacity=".055" stroke-width="1"/>
      <circle cx="0" cy="0" r="1.4" fill="#d8bd7f" fill-opacity=".14"/>
    </pattern>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity=".45"/>
    </filter>
    <clipPath id="mapClip">
