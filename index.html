<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex; align-items: center; justify-content: center; min-height: 100%;
    font-family: "EB Garamond", Georgia, "Times New Roman", serif;
    background: radial-gradient(1100px 760px at 50% -12%, #16223e, #0b1020 62%);
    color: #e9dcc0; text-align: center; padding: 28px;
  }
  .card { max-width: 460px; }
  img.logo { width: 96px; height: 96px; filter: drop-shadow(0 6px 18px rgba(0,0,0,.5)); }
  h1 { font-family: "Cinzel", Georgia, serif; font-weight: 700; letter-spacing: .06em;
       font-size: clamp(28px, 6vw, 40px); margin: .55rem 0 .2rem; }
  h1 .g { background: linear-gradient(90deg, #e8c877, #c9962f);
          -webkit-background-clip: text; background-clip: text; color: transparent; }
  p { color: #c7b899; margin: .3rem 0 1.4rem; font-size: 1.05rem; }
  .spin { width: 22px; height: 22px; margin: 0 auto 1rem;
          border: 3px solid rgba(233,220,192,.22); border-top-color: #e8c877;
          border-radius: 50%; animation: s .8s linear infinite; }
  @keyframes s { to { transform: rotate(360deg); } }
  .btn { display: inline-block; text-decoration: none; font-weight: 600; border-radius: 999px;
         padding: .7rem 1.5rem; background: linear-gradient(180deg, #e8c877, #c9962f);
         color: #1a1204; box-shadow: 0 6px 18px rgba(201,150,47,.35); }
  .btn:hover { filter: brightness(1.05); }
  .alt { display: block; margin-top: 1.1rem; font-size: .85rem; color: #9c8f72; }
  .alt a { color: #d8c9a5; }
</style>
</head>
